<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Mendoza · Set 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&display=swap">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{--bg:#F2F2F7;--bg2:#FFF;--bg3:#F2F2F7;--bg4:#E5E5EA;--sep:rgba(60,60,67,.18);--gold:#B8860B;--cr:#000;--t2:rgba(60,60,67,.6);--t3:rgba(60,60,67,.38);--blue:#007AFF;--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px)}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box;margin:0;padding:0}
html{height:100%;background:var(--bg)}
body{color:var(--cr);font-family:"Plus Jakarta Sans",-apple-system,"Helvetica Neue",Arial,sans-serif;font-size:15px;line-height:1.55;display:flex;flex-direction:column;overflow:hidden;height:100dvh;padding-top:var(--safe-t)}
/* HDR */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:.5px solid var(--sep);flex-shrink:0}
.logo{font-family:"Fraunces","Times New Roman",serif;font-size:21px;font-weight:300;letter-spacing:-.02em;color:#000;font-variation-settings:"opsz" 72}
.logo em{color:var(--gold);font-style:italic;font-weight:400}
.pax{font-size:10.5px;color:var(--t3);letter-spacing:.09em;text-transform:uppercase;font-weight:600}
/* PHASE */
.ptabs{display:flex;background:var(--bg2);border-bottom:.5px solid var(--sep);flex-shrink:0}
.ptab{flex:1;padding:10px 8px;font-size:12px;font-weight:600;color:var(--t2);border:none;background:none;cursor:pointer;touch-action:manipulation;border-bottom:2px solid transparent;margin-bottom:-.5px;text-align:center;line-height:1.3;letter-spacing:.01em}
.ptab.a{color:var(--gold);border-bottom-color:var(--gold)}
/* SCROLL MAIN */
.main{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
/* DAY NAV */
.dnav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:.5px solid var(--sep);padding:10px 14px;overflow-x:scroll;-webkit-overflow-scrolling:touch;display:flex;gap:6px;scrollbar-width:none}
.dnav::-webkit-scrollbar{display:none}
.dbtn{padding:6px 16px;border-radius:999px;font-size:12px;font-weight:600;border:.5px solid var(--sep);background:var(--bg2);color:var(--t2);cursor:pointer;touch-action:manipulation;white-space:nowrap;-webkit-appearance:none;letter-spacing:.01em}
.dbtn.a{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:600}
/* DAY HDR */
.dhdr{padding:20px 16px 14px;background:var(--bg2)}
.d-date{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;font-weight:700}
.d-title{font-family:"Plus Jakarta Sans",-apple-system,"Helvetica Neue",Arial,sans-serif;font-size:28px;font-weight:800;line-height:1.1;margin-bottom:6px;color:#000;letter-spacing:-.04em}
.d-sub{font-size:14px;color:var(--t2);margin-bottom:14px;line-height:1.65}
/* NAV BTNS */
.navbtns{display:flex;gap:8px;flex-wrap:wrap}
.nbtn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none;touch-action:manipulation;-webkit-appearance:none;white-space:nowrap;cursor:pointer;letter-spacing:.01em}
.nbtn-gm{background:#1a73e8;color:#fff}
.nbtn-wz{background:#05C8F7;color:#000}
.nbtn-ap{background:var(--bg3);color:var(--cr);border:.5px solid var(--sep)}
/* MAP */
.map-wrap{position:relative;background:var(--bg3)}
#day-map{height:220px}
.leaflet-container{background:#ddd!important}
.leaflet-control-attribution{display:none}
/* STOP PREVIEW — horizontal photo cards below map, like Google Maps summary */
.stop-preview{display:flex;overflow-x:scroll;gap:10px;padding:12px 16px;scrollbar-width:none;background:var(--bg2);border-bottom:.5px solid var(--sep)}
.stop-preview::-webkit-scrollbar{display:none}
.sp-card{flex:0 0 130px;height:90px;border-radius:12px;overflow:hidden;cursor:pointer;-webkit-appearance:none;border:none;padding:0;touch-action:manipulation;box-shadow:0 1px 4px rgba(0,0,0,.12)}
.sp-img{width:100%;height:100%;background-size:cover;background-position:center;background-color:var(--bg4);position:relative}
.sp-img::after{content:'';position:absolute;inset:0;background:linear-gradient(transparent 30%,rgba(0,0,0,.62))}
.sp-num{position:absolute;top:7px;left:7px;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;z-index:2;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.sp-time{position:absolute;top:7px;right:7px;font-size:9px;font-weight:600;color:rgba(255,255,255,.9);z-index:2;background:rgba(0,0,0,.38);padding:2px 5px;border-radius:4px}
.sp-label{position:absolute;bottom:7px;left:7px;right:7px;font-size:10.5px;font-weight:700;color:#fff;z-index:2;line-height:1.3;letter-spacing:.01em}
/* SECTION HEADER */
.sec-hdr{padding:12px 16px 7px;font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);background:var(--bg)}
/* STOP CARDS — timeline style */
.stops-list{padding:0 0 120px;background:var(--bg)}
.stop-section{background:var(--bg2);margin-bottom:8px}
.stop-row{display:flex;align-items:stretch;padding:0 16px;background:var(--bg2)}
.stop-tl{width:20px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:5px}
.stop-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;border:2.5px solid var(--bg2);box-shadow:0 0 0 1px rgba(0,0,0,.12)}
.stop-line{width:2px;flex:1;min-height:10px;margin-top:3px;border-radius:1px}
.stop-last .stop-line{display:none}
.stop-card{flex:1;margin-left:10px;padding:10px 0 18px;border-bottom:.5px solid var(--sep);cursor:pointer;touch-action:manipulation;-webkit-appearance:none;background:none;border:none;border-bottom:.5px solid var(--sep);text-align:left;width:100%;display:flex;gap:10px}
.stop-last .stop-card{border-bottom:none;padding-bottom:8px}
.stop-info{flex:1;min-width:0}
.stop-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:4px}
.stop-time{font-size:11.5px;color:var(--t3);font-weight:600;letter-spacing:.01em}
.badge,.status{font-size:10px;padding:2px 8px;border-radius:999px;white-space:nowrap;font-weight:600;letter-spacing:.02em}
.b-famous{background:rgba(100,80,180,.1);color:#5040A0}
.b-boutique{background:rgba(46,125,50,.1);color:#1A6B1E}
.b-almoco{background:rgba(160,80,20,.1);color:#9A4A10}
.b-cidade{background:rgba(80,80,80,.1);color:#505050}
.b-montanha{background:rgba(20,80,180,.1);color:#1450A0}
.b-hotel{background:rgba(160,30,30,.1);color:#901E1E}
.s-ok{background:rgba(52,199,89,.12);color:#1A8C36}
.s-warn{background:rgba(255,149,0,.14);color:#A05000}
.s-nohr{background:var(--bg3);color:var(--t3)}
.stop-name{font-size:16.5px;font-weight:700;line-height:1.25;color:#000;margin-bottom:3px;letter-spacing:-.01em}
.stop-hrs{font-size:11.5px;color:var(--t3);margin-bottom:3px;font-weight:500}
.stop-desc{font-size:13px;color:var(--t2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.stop-thumb{width:72px;height:72px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.stop-caret{font-size:11px;color:var(--t3);margin-top:5px;font-weight:600;letter-spacing:.04em}
/* OVERLAY */
.ov{position:fixed;top:0;left:0;right:0;bottom:0;background:transparent;z-index:8000;pointer-events:none;transition:background .3s}
.ov.open{background:rgba(0,0,0,.45);pointer-events:auto}
/* SHEET */
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:8001;background:var(--bg2);border-radius:20px 20px 0 0;max-height:93dvh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);padding-bottom:var(--safe-b);will-change:transform}
.sheet.open{transform:translateY(0)}
.sh-handle{flex-shrink:0;padding:12px 0 0;display:flex;justify-content:center;cursor:pointer;touch-action:none}
.sh-handle div{width:36px;height:4px;background:var(--bg4);border-radius:2px}
.sh-close{position:absolute;top:20px;right:16px;z-index:10;width:30px;height:30px;border-radius:50%;background:var(--bg3);border:none;color:var(--t2);font-size:14px;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center;-webkit-appearance:none}
/* photo scroll-snap */
.ph-scroll{display:flex;overflow-x:scroll;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;flex-shrink:0;scrollbar-width:none}
.ph-scroll::-webkit-scrollbar{display:none}
.ph-slide{flex:0 0 100%;scroll-snap-align:start;position:relative}
.ph-slide img{width:100%;height:220px;object-fit:cover;display:block;background:var(--bg3)}
.ph-dots-container{display:flex;justify-content:center;gap:5px;padding:8px 0;background:rgba(0,0,0,.15)}
.ph-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.5);transition:background .2s}
.ph-dot.a{background:#fff}
/* lightbox */
.lb{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.93);display:none;flex-direction:column;align-items:center;justify-content:center;touch-action:none}
.lb.open{display:flex}
.lb-img{max-width:100%;max-height:calc(100dvh - 80px);object-fit:contain;display:block;user-select:none;-webkit-user-drag:none}
.lb-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10}
.lb-close:hover{background:rgba(255,255,255,.25)}
.lb-arrow{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:background .2s}
.lb-arrow:hover{background:rgba(255,255,255,.3)}
.lb-prev{left:12px}
.lb-next{right:12px}
.lb-counter{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.7);font-size:13px;letter-spacing:.05em}
/* sheet body */
.sh-body{overflow-y:scroll;-webkit-overflow-scrolling:touch;flex:1;padding:0}
.sh-body::-webkit-scrollbar{display:none}
.sh-inner{padding:14px 16px 10px}
.sh-name{font-family:"Fraunces","Times New Roman",serif;font-size:26px;font-weight:300;line-height:1.2;margin-bottom:8px;color:#000;letter-spacing:-.02em;font-variation-settings:"opsz" 72}
.sh-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.sh-rating{font-size:13px;color:var(--gold);display:flex;align-items:center;gap:4px}
.sh-sect{margin-bottom:16px}
.sh-sect-t{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;font-weight:700}
.h-grid{display:grid;grid-template-columns:auto 1fr;gap:4px 14px}
.h-day{color:var(--t3);font-size:13px;font-weight:500}
.h-val{color:var(--cr);font-size:13px;font-weight:500}
.h-val.cl{color:var(--t3);font-style:italic}
.sh-desc{font-size:14.5px;color:var(--t2);line-height:1.7}
/* actions */
.sh-acts{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-top:14px;border-top:.5px solid var(--sep)}
.ab{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 8px;border-radius:12px;font-size:13px;font-weight:600;text-decoration:none;cursor:pointer;touch-action:manipulation;border:.5px solid var(--sep);color:var(--t2);background:var(--bg3);-webkit-appearance:none;white-space:nowrap}
.ab.full{grid-column:1/-1}
.ab.site{background:var(--blue);border-color:var(--blue);color:#fff}
.ab.wz{background:#05C8F7;border-color:#05C8F7;color:#000}
.ab.wa{background:#25D366;border-color:#25D366;color:#fff}
.ab.ap{background:var(--bg3);border-color:var(--sep);color:var(--cr)}
.ab.menu{background:rgba(180,120,30,.12);color:#8C5E20;border-color:rgba(180,120,30,.3)}
/* DARK MODE */
html.dark{--bg:#1C1C1E;--bg2:#2C2C2E;--bg3:#3A3A3C;--bg4:#48484A;--sep:rgba(255,255,255,.12);--gold:#D4A843;--cr:#FFFFFF;--t2:rgba(255,255,255,.6);--t3:rgba(255,255,255,.38);--blue:#0A84FF}
html.dark .logo{color:#fff}
html.dark .d-title{color:var(--cr)}
html.dark .stop-name{color:#fff}
html.dark .sh-name{color:#fff}
html.dark .hdr{background:rgba(28,28,30,.92)}
html.dark .dnav{background:rgba(28,28,30,.92)}
html.dark .leaflet-container{background:#333!important}
/* THEME BUTTON */
.theme-btn{width:30px;height:30px;border-radius:50%;border:.5px solid var(--sep);background:var(--bg3);color:var(--cr);font-size:15px;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center;-webkit-appearance:none;flex-shrink:0;line-height:1}

/* ── File Attachments ─────────────────────────────────────────────────────── */
.sh-files{margin-top:16px;border-top:.5px solid var(--sep);padding-top:14px}
.sh-files-hd{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.sh-files-add{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;touch-action:manipulation;-webkit-appearance:none}
.sh-file-list{display:flex;flex-direction:column;gap:8px;margin-bottom:6px}
.sh-file-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg3);border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.sh-file-ico{font-size:22px;flex-shrink:0;line-height:1}
.sh-file-info{flex:1;min-width:0}
.sh-file-name{font-size:13px;font-weight:600;color:var(--cr);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sh-file-sz{font-size:11px;color:var(--t3);margin-top:1px}
.sh-file-del{background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer;padding:4px 8px;flex-shrink:0;line-height:1;touch-action:manipulation;-webkit-appearance:none}
.sh-files-empty{font-size:13px;color:var(--t3);text-align:center;padding:16px 0;font-style:italic}
.stop-filebadge{font-size:10px;background:rgba(0,122,255,.12);color:var(--blue);border-radius:999px;padding:2px 7px;font-weight:600;margin-top:5px;display:inline-block}
/* ── Status: realizado / pendente ─────────────────────────────────────────── */
.b-opcional{background:rgba(120,90,200,.12);color:#6A4AC0}
html.dark .b-opcional{background:rgba(150,120,230,.18);color:#B9A6F0}
.st-pill{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:700;letter-spacing:.02em;white-space:nowrap;display:inline-flex;align-items:center;gap:3px}
.st-done{background:rgba(52,199,89,.16);color:#1A8C36}
.st-pend{background:rgba(255,149,0,.18);color:#9A5A00}
.stop-row.is-done .stop-name{text-decoration:line-through;opacity:.55}
.stop-row.is-done .stop-card{opacity:.78}
.stop-row.is-pend{background:rgba(255,149,0,.05)}
.stop-row.is-pend .stop-section,.stop-row.is-pend{}
.stop-row.is-pend .stop-dot{box-shadow:0 0 0 2px rgba(255,149,0,.5)}
/* status controls in sheet */
.sh-status{display:flex;gap:8px;margin-bottom:16px}
.stbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 8px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;touch-action:manipulation;border:1px solid var(--sep);background:var(--bg3);color:var(--t2);-webkit-appearance:none}
.stbtn.done.on{background:rgba(52,199,89,.16);border-color:rgba(52,199,89,.5);color:#1A8C36}
.stbtn.pend.on{background:rgba(255,149,0,.16);border-color:rgba(255,149,0,.5);color:#9A5A00}
/* reschedule modal */
.rs-modal{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center}
.rs-modal.open{display:flex}
.rs-card{background:var(--bg2);width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:20px 16px calc(16px + var(--safe-b));max-height:80dvh;display:flex;flex-direction:column;animation:rsUp .3s cubic-bezier(.32,.72,0,1)}
@keyframes rsUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.rs-title{font-size:17px;font-weight:800;color:var(--cr);margin-bottom:4px}
.rs-desc{font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:14px}
.rs-list{overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.rs-opt{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;background:var(--bg3);border:1.5px solid transparent;cursor:pointer;touch-action:manipulation}
.rs-opt.sel{border-color:var(--gold);background:rgba(184,134,11,.08)}
.rs-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--t3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700}
.rs-opt.sel .rs-check{background:var(--gold);border-color:var(--gold)}
.rs-opt-label{font-size:14px;font-weight:600;color:var(--cr)}
.rs-opt-date{font-size:11.5px;color:var(--t3);margin-top:1px}
.rs-acts{display:flex;gap:10px}
.rs-btn{flex:1;padding:13px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;touch-action:manipulation;border:none;-webkit-appearance:none}
.rs-btn.cancel{background:var(--bg3);color:var(--t2)}
.rs-btn.confirm{background:var(--gold);color:#fff}
.rs-btn.confirm:disabled{opacity:.4}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">Mendoza <em>·</em> Set 2026</div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="pax">4 adultos · 2 bebês</div>
    <button class="theme-btn" id="themeBtn" aria-label="Alternar modo escuro">🌙</button>
  </div>
</div>
<div class="ptabs">
  <button class="ptab a" id="tab-uco">🏔 Valle de Uco · 06–09/09</button>
  <button class="ptab" id="tab-city">🍷 Mendoza Centro · 09–15/09</button>
</div>
<div class="main" id="main">
  <div class="dnav" id="dnav"></div>
  <div id="content"></div>
</div>
<div class="ov" id="ov"></div>
<div class="sheet" id="sheet">
  <button class="sh-close" id="shClose">✕</button>
  <div class="sh-handle" id="shHandle"><div></div></div>
  <div class="sh-body">
    <div class="ph-scroll" id="phScroll"></div>
    <div class="ph-dots-container" id="phDots"></div>
    <div class="sh-inner">
      <div class="sh-name" id="shName"></div>
      <div class="sh-badges" id="shBadges"></div>
      <div class="sh-status" id="shStatus"></div>
      <div class="sh-sect" id="shHrsSect">
        <div class="sh-sect-t">Horários de funcionamento</div>
        <div class="h-grid" id="shHrs"></div>
      </div>
      <div class="sh-sect">
        <div class="sh-sect-t">Sobre o local</div>
        <div class="sh-desc" id="shDesc"></div>
      </div>
      <div class="sh-acts" id="shActs"></div>
      <div id="shFiles"></div>
    </div>
  </div>
</div>
<!-- lightbox -->
<div class="lb" id="lb" role="dialog" aria-modal="true">
  <button class="lb-close" id="lbClose" aria-label="Fechar">✕</button>
  <button class="lb-arrow lb-prev" id="lbPrev" aria-label="Anterior">&#8249;</button>
  <img class="lb-img" id="lbImg" src="" alt="">
  <button class="lb-arrow lb-next" id="lbNext" aria-label="Próxima">&#8250;</button>
  <div class="lb-counter" id="lbCounter"></div>
</div>
<!-- reschedule modal -->
<div class="rs-modal" id="rsModal" role="dialog" aria-modal="true">
  <div class="rs-card">
    <div class="rs-title">Relançar para outro dia</div>
    <div class="rs-desc" id="rsDesc">Escolha o dia para onde deseja mover esta atração. A rota do dia será recalculada automaticamente.</div>
    <div class="rs-list" id="rsList"></div>
    <div class="rs-acts">
      <button class="rs-btn cancel" id="rsCancel">Cancelar</button>

// Theme toggle — runs immediately, before paint, to avoid flash
(function(){
  const root=document.documentElement;
  const saved=localStorage.getItem('theme');
  if(saved==='dark') root.classList.add('dark');
  document.addEventListener('DOMContentLoaded',function(){
    const btn=document.getElementById('themeBtn');
    if(!btn) return;
    btn.textContent=root.classList.contains('dark')?'☀️':'🌙';
    btn.addEventListener('click',function(){
      const isDark=root.classList.toggle('dark');
      btn.textContent=isDark?'☀️':'🌙';
      localStorage.setItem('theme',isDark?'dark':'light');
    });
  });
})();


// ── IndexedDB File Storage ───────────────────────────────────────────────────
(function(){
  const DB='mendoza2026-files',ST='files';
  let db=null;
  function openDB(){
    return new Promise((res,rej)=>{
      const r=indexedDB.open(DB,1);
      r.onupgradeneeded=e=>{
        const d=e.target.result;
        if(!d.objectStoreNames.contains(ST)){
          const s=d.createObjectStore(ST,{keyPath:'id',autoIncrement:true});
          s.createIndex('sk','sk',{unique:false});
        }
      };
      r.onsuccess=e=>{db=e.target.result;res(db);};
      r.onerror=rej;
    });
  }
  window.FILES={
    ready:openDB(),
    get(sk){return new Promise((res,rej)=>{const tx=db.transaction(ST,'readonly');const req=tx.objectStore(ST).index('sk').getAll(sk);req.onsuccess=()=>res(req.result||[]);req.onerror=rej;});},
    save(sk,file){return new Promise((res,rej)=>{const rd=new FileReader();rd.onload=()=>{const tx=db.transaction(ST,'readwrite');const req=tx.objectStore(ST).add({sk,name:file.name,type:file.type,size:file.size,data:rd.result,at:Date.now()});req.onsuccess=()=>res(req.result);req.onerror=rej;};rd.onerror=rej;rd.readAsArrayBuffer(file);});},
    del(id){return new Promise((res,rej)=>{const tx=db.transaction(ST,'readwrite');const req=tx.objectStore(ST).delete(id);req.onsuccess=res;req.onerror=rej;});},
    hasAny(sk){return new Promise((res)=>{const tx=db.transaction(ST,'readonly');const req=tx.objectStore(ST).index('sk').getKey(sk);req.onsuccess=()=>res(req.result!==undefined);req.onerror=()=>res(false);});}
  };
})();
function buildSk(phase,label,name){return phase+'||'+label+'||'+name;}

// Hotels — departure point for each phase
const HOTELS={
  uco:{lat:-33.5381164,lng:-69.0210418},
  city:{lat:-32.8919487,lng:-68.8381429}
};

// ─── Roteiro: status (realizado/pendente) + reagendamento + recálculo de rota ──
const PHASE_NAME={uco:"Valle de Uco",city:"Mendoza"};

// Regenera os links de rota (Google Maps/Waze) a partir da ordem atual das paradas.
function rebuildRouteUrl(day,phase){
  const pts=(day.stops||[]).filter(s=>s.lat&&s.lng);
  if(!pts.length){return;}
  const o=HOTELS[phase]||{lat:pts[0].lat,lng:pts[0].lng};
  const dest=pts[pts.length-1];
  const wps=pts.slice(0,-1).map(s=>s.lat+","+s.lng).join("%7C");
  let url="https://www.google.com/maps/dir/?api=1&travelmode=driving&origin="+o.lat+","+o.lng;
  if(wps) url+="&waypoints="+wps;
  url+="&destination="+dest.lat+","+dest.lng;
  day.route=url;
  day.waze="https://waze.com/ul?ll="+pts[0].lat+","+pts[0].lng+"&navigate=yes";
}

// Reordena as paradas do dia pela melhor rota (vizinho mais próximo a partir do hotel) e regenera os links.
function optimizeDay(day,phase){
  const o=HOTELS[phase];
  const withPt=(day.stops||[]).filter(s=>s.lat&&s.lng);
  const noPt=(day.stops||[]).filter(s=>!(s.lat&&s.lng));
  if(withPt.length>1&&o){
    const rem=withPt.slice(),ord=[];let cx=o.lat,cy=o.lng;
    while(rem.length){
      let bi=0,bd=Infinity;
      for(let i=0;i<rem.length;i++){const dx=rem[i].lat-cx,dy=rem[i].lng-cy,d=dx*dx+dy*dy;if(d<bd){bd=d;bi=i;}}
      const n=rem.splice(bi,1)[0];ord.push(n);cx=n.lat;cy=n.lng;
    }
    day.stops=ord.concat(noPt);
  }
  rebuildRouteUrl(day,phase);
}

// Baseline: move a Escala Humana para o dia da Zuccardi (Seg 8 set) como opcional à tarde.
function applyBaseline(){}

// IDs estáveis por parada (origem fixa) — sobrevivem a movimentações.
function assignIds(){
  for(const p in DATA) DATA[p].forEach(d=>(d.stops||[]).forEach(s=>{ if(!s._id) s._id=p+"|"+d.label+"|"+s.name; }));
}

// Persistência do plano (status + movimentações) em localStorage.
const PKEY="tripPlan";
let PLAN={status:{},moves:[]};
function loadPlanLS(){ try{const r=localStorage.getItem(PKEY); if(r){const o=JSON.parse(r); PLAN={status:o.status||{},moves:o.moves||[]};}}catch(e){} }
function savePlan(){ try{localStorage.setItem(PKEY,JSON.stringify(PLAN));}catch(e){} }

function locateStop(id){
  for(const p in DATA){const arr=DATA[p];for(let k=0;k<arr.length;k++){const ss=arr[k].stops||[];const si=ss.findIndex(s=>s._id===id);if(si>=0)return{ph:p,day:arr[k],si};}}
  return null;
}
function dayByKey(key){const a=key.split("|"),p=a[0],l=a[1];const day=(DATA[p]||[]).find(d=>d.label===l);return day?{ph:p,day}:null;}

// Reaplica as movimentações salvas e os status sobre o DATA base.
function applyPlan(){
  (PLAN.moves||[]).forEach(mv=>{
    const loc=locateStop(mv.id),tgt=dayByKey(mv.to);
    if(!loc||!tgt||loc.day===tgt.day) return;
    const st=loc.day.stops.splice(loc.si,1)[0];
    tgt.day.stops.push(st);
    rebuildRouteUrl(loc.day,loc.ph);
    optimizeDay(tgt.day,tgt.ph);
  });
  for(const p in DATA) DATA[p].forEach(d=>(d.stops||[]).forEach(s=>{ s._status=PLAN.status[s._id]||null; }));
}

function setStatus(stop,state){
  if(state) PLAN.status[stop._id]=state; else delete PLAN.status[stop._id];
  stop._status=state||null; savePlan();
}

applyBaseline();
assignIds();
loadPlanLS();
applyPlan();

let _rsIdx=null,_rsSel=null;
function openReschedule(idx){
  _rsIdx=idx; _rsSel=null;
  const cur=DATA[ph][di], s=cur.stops[idx];
  document.getElementById("rsDesc").textContent='Para qual dia deseja relançar "'+s.name+'"? A rota do dia escolhido será recalculada automaticamente.';
  const opts=[];
  for(const p in DATA) DATA[p].forEach(d=>{ if(d!==cur) opts.push({key:p+"|"+d.label,label:d.label,date:d.date,ph:p}); });
  document.getElementById("rsList").innerHTML=opts.map(o=>
    '<div class="rs-opt" data-key="'+o.key+'"><div class="rs-check">✓</div><div><div class="rs-opt-label">'+et(o.date)+'</div><div class="rs-opt-date">'+et(o.label)+' · '+et(PHASE_NAME[o.ph])+'</div></div></div>'
  ).join("");
  document.getElementById("rsList").querySelectorAll(".rs-opt").forEach(el=>{
    el.onclick=function(){
      _rsSel=el.dataset.key;
      document.querySelectorAll(".rs-opt").forEach(x=>x.classList.toggle("sel",x===el));
      document.getElementById("rsConfirm").disabled=false;
    };
  });
  document.getElementById("rsConfirm").disabled=true;
  document.getElementById("rsModal").classList.add("open");
}
function closeReschedule(){ document.getElementById("rsModal").classList.remove("open"); }
function confirmReschedule(){
  if(_rsSel==null||_rsIdx==null) return;
  const cur=DATA[ph][di], s=cur.stops[_rsIdx], tgt=dayByKey(_rsSel);
  if(!tgt) return;
  setStatus(s,"pending");
  PLAN.moves.push({id:s._id,to:_rsSel}); savePlan();
  cur.stops.splice(_rsIdx,1);
  tgt.day.stops.push(s);
  rebuildRouteUrl(cur,ph);
  optimizeDay(tgt.day,tgt.ph);
  closeReschedule(); closeSheet();
  setPhase(tgt.ph);
  setDay(DATA[tgt.ph].indexOf(tgt.day));
}

// Leaflet interactive map with hotel as route origin
let _map=null;
function initMap(stops,phase){
  const el=document.getElementById("day-map");
  if(!el) return;
  if(_map){_map.remove();_map=null;}
  const pts=stops.filter(s=>s.lat&&s.lng);
  if(!pts.length){el.parentElement.style.display="none";return;}
  el.parentElement.style.display="";

  const hotel=HOTELS[phase]||HOTELS.city;
  const isHotelFirst=pts.length>0&&Math.abs(pts[0].lat-hotel.lat)<0.005&&Math.abs(pts[0].lng-hotel.lng)<0.005;
  const routePts=isHotelFirst?pts:[hotel,...pts];

  _map=L.map(el,{zoomControl:false,attributionControl:false,scrollWheelZoom:false,dragging:true});
  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{maxZoom:19}).addTo(_map);

  if(!isHotelFirst){
    const hi=L.divIcon({
      html:`<div style="background:#fff;width:24px;height:24px;border-radius:50%;border:2px solid #C49A4A;display:flex;align-items:center;justify-content:center;font-size:12px;box-shadow:0 2px 6px rgba(0,0,0,.6)">🏨</div>`,
      className:"",iconSize:[24,24],iconAnchor:[12,12]
    });
    L.marker([hotel.lat,hotel.lng],{icon:hi}).addTo(_map);
  }

  pts.forEach((s,i)=>{
    const c=STOP_COLORS[i%STOP_COLORS.length];
    const icon=L.divIcon({
      html:`<div style="background:${c};width:26px;height:26px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#0D0B09;box-shadow:0 2px 6px rgba(0,0,0,.5)">${i+1}</div>`,
      className:"",iconSize:[26,26],iconAnchor:[13,13]
    });
    L.marker([s.lat,s.lng],{icon}).addTo(_map);
  });

  if(routePts.length>1) L.polyline(routePts.map(s=>[s.lat,s.lng]),{color:"#C49A4A",weight:2.5,opacity:.75,dashArray:"6,4"}).addTo(_map);
  const bounds=L.latLngBounds(routePts.map(s=>[s.lat,s.lng]));
  _map.fitBounds(bounds,{padding:[30,30]});
}

// Time of day section label
function timeSection(t){
  if(!t) return null;
  const m=t.match(/~?(\d+)h/);
  if(!m) return null;
  const h=parseInt(m[1]);
  return h>=18?"Noite":h>=12?"Tarde":"Manhã";
}

let ph="uco", di=0;

// ─── tap vs scroll detection ────────────────────────────────────────────────
// touchmove sets _moved=true; touchstart resets it.
// All click handlers check _moved before acting, so scroll never triggers an action.
let _moved=false;
document.addEventListener("touchstart",()=>{_moved=false;},{passive:true});
document.addEventListener("touchmove",()=>{_moved=true;},{passive:true});
function onTap(el,fn){
  el.addEventListener("click",function(e){if(!_moved)fn.call(this,e);});
}

// ─── build day nav ─────────────────────────────────────────────────────────
function buildNav(){
  const days=DATA[ph];
  document.getElementById("dnav").innerHTML=days.map((d,i)=>
    `<button class="dbtn${i===di?" a":""}" data-i="${i}">${d.label}</button>`
  ).join("");
  document.querySelectorAll(".dbtn").forEach(b=>{
    onTap(b,function(){setDay(parseInt(this.dataset.i));});
  });
  // scroll active into view
  const active=document.querySelector(".dbtn.a");
  if(active) active.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
}

// ─── render day ────────────────────────────────────────────────────────────
function renderDay(){
  const day=DATA[ph][di];
  const cont=document.getElementById("content");

  let navH="";
  if(day.route||day.waze||day.stops?.length){
    navH=`<div class="navbtns">`;
    if(day.route) navH+=`<a class="nbtn nbtn-gm" href="${eu(day.route)}">${LOGO.gm} Google Maps</a>`;
    if(day.waze)  navH+=`<a class="nbtn nbtn-wz" href="${eu(day.waze)}">${LOGO.wz} Waze</a>`;
    if(!day.route&&day.stops&&day.stops[0]&&day.stops[0].lat){
      const s0=day.stops[0];
      navH+=`<a class="nbtn nbtn-gm" href="https://maps.google.com/?cid=${s0.gmaps||s0.lat}">${LOGO.gm} Google Maps</a>`;
    }
    if(!day.waze&&day.stops&&day.stops[0]&&day.stops[0].lat){
      const s0=day.stops[0];
      navH+=`<a class="nbtn nbtn-wz" href="https://waze.com/ul?ll=${s0.lat},${s0.lng}&amp;navigate=yes">${LOGO.wz} Waze</a>`;
    }
    navH+=`</div>`;
  }

  const stops=day.stops||[];
  const hasMapPts=stops.some(s=>s.lat&&s.lng);
  const mapH=`<div class="map-wrap"${hasMapPts?"":" style=\"display:none\""}><div id="day-map"></div></div>`;

  // Stop preview strip (horizontal photo cards below map — like Google Maps)
  const previewH=stops.length?`<div class="stop-preview">${stops.map((s,i)=>{
    const ph0=s.photos&&s.photos[0]?s.photos[0]:"";
    const dot=STOP_COLORS[i%STOP_COLORS.length];
    const timeShort=s.time?s.time.split("–")[0].trim():"";
    return `<button class="sp-card" data-idx="${i}">
      <div class="sp-img"${ph0?` style="background-image:url('${ph0}')"`:""}>
        <div class="sp-num" style="background:${dot}">${i+1}</div>
        ${timeShort?`<div class="sp-time">${et(timeShort)}</div>`:""}
        <div class="sp-label">${et(s.name)}</div>
      </div>
    </button>`;
  }).join("")}</div>`:"";

  // Group stops by time of day
  const secMap={};const secOrder=[];
  stops.forEach((s,i)=>{
    const sec=timeSection(s.time)||"Todo o dia";
    if(!secMap[sec]){secMap[sec]=[];secOrder.push(sec);}
    secMap[sec].push({s,i});
  });

  let stopsH='<div class="stops-list">';
  secOrder.forEach(sec=>{
    stopsH+=`<div class="sec-hdr">${sec}</div><div class="stop-section">`;
    const items=secMap[sec];
    items.forEach(({s,i},idx)=>{
      const isLast=idx===items.length-1;
      const bk=BC[s.badge]||"b-cidade";
      const sk=s.st?SC[s.st]:"";
      const ph0=s.photos&&s.photos[0]?s.photos[0]:"";
      const dot=STOP_COLORS[i%STOP_COLORS.length];
      stopsH+=`
        <div class="stop-row${isLast?" stop-last":""}${s._status==="done"?" is-done":s._status==="pending"?" is-pend":""}">
          <div class="stop-tl">
            <div class="stop-dot" style="background:${dot}"></div>
            <div class="stop-line" style="background:${dot}33"></div>
          </div>
          <button class="stop-card" data-idx="${i}">
            <div class="stop-info">
              <div class="stop-meta">
                ${s.time?`<span class="stop-time">${et(s.time)}</span>`:""}
                ${s._status?`<span class="st-pill st-${s._status==="done"?"done":"pend"}">${s._status==="done"?"✓ Realizado":"🕓 Pendente"}</span>`:""}
                ${s.badge?`<span class="badge ${bk}">${et(s.badge)}</span>`:""}
                ${s.st?`<span class="status ${sk}">${et(s.stl)}</span>`:""}
              </div>
              <div class="stop-name">${et(s.name)}</div>
              ${s.hrs?`<div class="stop-hrs">🕐 ${et(s.hrs)}</div>`:""}
              ${s.desc?`<div class="stop-desc">${et(s.desc)}</div>`:""}
              <div class="stop-caret">ver detalhes ›</div>
              <span class="stop-filebadge" data-sk="${buildSk(ph,day.label,s.name)}" style="display:none">📎 arquivos</span>
            </div>
            ${ph0?`<img class="stop-thumb" src="${ph0}" alt="" loading="lazy" onload="this.style.opacity=1" onerror="this.remove()" style="opacity:0;transition:opacity .3s">`:""}
          </button>
        </div>`;
    });
    stopsH+='</div>';
  });
  stopsH+='</div>';

  cont.innerHTML=`
    <div class="dhdr">
      <div class="d-date">${et(day.date)}</div>
      <div class="d-title">${et(day.title)}</div>
      <div class="d-sub">${et(day.sub)}</div>
      ${navH}
    </div>
    ${mapH}
    ${previewH}
    ${stopsH}`;

  cont.querySelectorAll(".stop-card,.sp-card").forEach(btn=>{
    onTap(btn,function(){openSheet(parseInt(this.dataset.idx));});
  });

  document.getElementById("main").scrollTo({top:0,behavior:"instant"});
  if(window.FILES) FILES.ready.then(()=>{document.querySelectorAll('[data-sk]').forEach(async b=>{const h=await FILES.hasAny(b.dataset.sk);b.style.display=h?'inline-block':'none';});});
  buildNav();
  initMap(day.stops||[],ph);
}

function updatePhotoScroll(photos){
  const ps=document.getElementById('phScroll');
  const dc=document.getElementById('phDots');
  window._lbPhotos=photos;
  ps.innerHTML=photos.map(function(u,i){
    return '<div class="ph-slide"><img src="'+u+'" alt="" loading="eager" style="cursor:pointer" onclick="openLightbox(window._lbPhotos,'+i+')" onerror="this.closest(\'.ph-slide\').style.display=\'none\'"></div>';
  }).join('');
  if(photos.length>1){
    dc.innerHTML=photos.map(function(_,j){return '<div class="ph-dot'+(j===0?' a':'')+'"></div>';}).join('');
    dc.style.display='flex';
    ps.onscroll=function(){
      const ci=Math.round(ps.scrollLeft/ps.clientWidth);
      dc.querySelectorAll('.ph-dot').forEach(function(d,j){d.classList.toggle('a',j===ci);});
    };
  } else {
    dc.style.display='none';
    ps.onscroll=null;
  }
}

// ─── open sheet ────────────────────────────────────────────────────────────
function openSheet(idx){
  const s=DATA[ph][di].stops[idx];

  // photos
  const photos=s.photos||[];
  updatePhotoScroll(photos);
  document.getElementById('phScroll').scrollLeft=0;

  // name
  document.getElementById("shName").textContent=s.name||"";

  // badges
  let bdg="";
  if(s.badge) bdg+=`<span class="badge ${BC[s.badge]||"b-cidade"}">${et(s.badge)}</span>`;
  if(s.st)    bdg+=`<span class="status ${SC[s.st]||""}">${et(s.stl)}</span>`;
  if(s.rating) bdg+=`<span class="sh-rating">⭐ ${s.rating} <span style="color:var(--t3)">(${Number(s.rcount||0).toLocaleString("pt-BR")})</span></span>`;
  document.getElementById("shBadges").innerHTML=bdg;

  // status controls (realizado / pendente)
  renderSheetStatus(idx);

  // hours
  const hSect=document.getElementById("shHrsSect");
  if(s.hours){
    hSect.style.display="";
    document.getElementById("shHrs").innerHTML=
      Object.entries(s.hours).map(([d,v])=>
        `<span class="h-day">${et(d)}</span><span class="h-val${v==="FECHADO"?" cl":""}">${et(v)}</span>`
      ).join("");
  } else { hSect.style.display="none"; }

  // desc
  document.getElementById("shDesc").textContent=s.desc||"";

  // action buttons — use eu() for all URLs, NO target=_blank (iOS deep links need direct navigation)
  const wa=s.wa?(s.wa.replace(/\s+/g,"")):"";
  const waMsg=encodeURIComponent("Olá! Gostaria de fazer uma reserva.");
  let acts="";

  if(s.website) acts+=`<a class="ab site" href="${eu(s.website)}">🌐 Site oficial</a>`;

  if(s.gmaps)   acts+=`<a class="ab ap" href="${eu(s.gmaps)}">${LOGO.gm} Google Maps</a>`;
  if(s.lat)     acts+=`<a class="ab wz" href="https://waze.com/ul?ll=${s.lat},${s.lng}&amp;navigate=yes">${LOGO.wz} Waze</a>`;
  if(wa)        acts+=`<a class="ab wa" href="https://wa.me/${wa}?text=${waMsg}">${LOGO.wa} WhatsApp</a>`;
  else if(s.phone) acts+=`<a class="ab ap full" href="tel:${eu(s.phone)}">📞 ${et(s.phone)}</a>`;

  const isRestaurant=s.t==='lunch'||s.badge==='almoco'||s.hasMenu;
  if(isRestaurant){
    const mp=s.menuPhotos||[];
    if(mp.length){
      window._menuPhotos=mp;
      acts+=`<button class="ab menu full" onclick="openLightbox(window._menuPhotos,0)">📋 Cardápio</button>`;
    } else if(s.website){
      acts+=`<a class="ab menu full" href="${eu(s.website)}">📋 Cardápio</a>`;
    }
  }

  document.getElementById("shActs").innerHTML=acts;
  // files section
  const _sk=buildSk(ph,DATA[ph][di].label,s.name);
  document.getElementById('shFiles').innerHTML='';
  if(window.FILES) FILES.ready.then(()=>renderFilesSection(_sk));

  // freeze body scroll (iOS)
  const sy=window.scrollY||document.documentElement.scrollTop;
  document.body.style.position="fixed";
  document.body.style.top=`-${sy}px`;
  document.body.style.width="100%";

  document.getElementById("sheet").classList.add("open");
  document.getElementById("ov").classList.add("open");
}

// ─── close sheet ───────────────────────────────────────────────────────────
function closeSheet(){
  document.getElementById("sheet").classList.remove("open");
  document.getElementById("ov").classList.remove("open");
  const top=parseInt(document.body.style.top||"0")*-1;
  document.body.style.position="";
  document.body.style.top="";
  document.body.style.width="";
  window.scrollTo(0,top);
}

// close handlers — click only (sheet doesn't scroll, no onTap needed)
["shClose","shHandle","ov"].forEach(id=>{
  document.getElementById(id).addEventListener("click",closeSheet);
});

// reschedule modal wiring
document.getElementById("rsCancel").addEventListener("click",closeReschedule);
document.getElementById("rsConfirm").addEventListener("click",confirmReschedule);
document.getElementById("rsModal").addEventListener("click",function(e){if(e.target.id==="rsModal")closeReschedule();});

// ─── lightbox ──────────────────────────────────────────────────────────────
(function(){
  let _photos=[], _idx=0, _startX=0, _dragging=false;
  const lb=document.getElementById("lb");
  const lbImg=document.getElementById("lbImg");
  const lbCounter=document.getElementById("lbCounter");

  function show(i){
    _idx=(i+_photos.length)%_photos.length;
    lbImg.src=_photos[_idx];
    lbCounter.textContent=_photos.length>1?`${_idx+1} / ${_photos.length}`:"";
    document.getElementById("lbPrev").style.display=_photos.length>1?"flex":"none";
    document.getElementById("lbNext").style.display=_photos.length>1?"flex":"none";
  }

  window.openLightbox=function(photos, idx){
    _photos=photos; show(idx);
    lb.classList.add("open");
  };

  document.getElementById("lbClose").addEventListener("click",()=>lb.classList.remove("open"));
  document.getElementById("lbPrev").addEventListener("click",()=>show(_idx-1));
  document.getElementById("lbNext").addEventListener("click",()=>show(_idx+1));
  lb.addEventListener("click",function(e){if(e.target===lb)lb.classList.remove("open");});

  // keyboard
  document.addEventListener("keydown",function(e){
    if(!lb.classList.contains("open")) return;
    if(e.key==="ArrowLeft") show(_idx-1);
    else if(e.key==="ArrowRight") show(_idx+1);
    else if(e.key==="Escape") lb.classList.remove("open");
  });

  // swipe
  lb.addEventListener("pointerdown",function(e){_startX=e.clientX;_dragging=true;});
  lb.addEventListener("pointerup",function(e){
    if(!_dragging) return; _dragging=false;
    const dx=e.clientX-_startX;
    if(Math.abs(dx)>50) show(dx<0?_idx+1:_idx-1);
  });
})();

// ─── phase switch ──────────────────────────────────────────────────────────
function setPhase(p){
  ph=p; di=0;
  document.getElementById("tab-uco").classList.toggle("a",p==="uco");
  document.getElementById("tab-city").classList.toggle("a",p==="city");
  renderDay();
}
["tab-uco","tab-city"].forEach(id=>{
  const p=id==="tab-uco"?"uco":"city";
  onTap(document.getElementById(id),()=>setPhase(p));
});

function setDay(i){ di=i; renderDay(); }

// ─── init ──────────────────────────────────────────────────────────────────
renderDay();

// ── File Attachments ─────────────────────────────────────────────────────────
function fmtSize(b){if(b<1024)return b+'B';if(b<1048576)return (b/1024).toFixed(1)+'KB';return (b/1048576).toFixed(1)+'MB';}
function fileIco(type){if(type==='application/pdf')return '📄';if(type.startsWith('image/'))return '🖼️';if(type.startsWith('video/'))return '🎥';if(type.startsWith('audio/'))return '🎵';return '📎';}

async function renderFilesSection(stopSk){
  const el=document.getElementById('shFiles');
  if(!el) return;
  const files=await FILES.get(stopSk);
  let h=`<div class="sh-files">
    <div class="sh-files-hd">
      <span>📎 Reservas &amp; Ingressos</span>
      <button class="sh-files-add" id="shFilesAdd">+ Adicionar</button>
    </div>`;
  if(files.length){
    h+=`<div class="sh-file-list">`;
    files.forEach(f=>{
      h+=`<div class="sh-file-row" data-fid="${f.id}">
        <div class="sh-file-ico">${fileIco(f.type)}</div>
        <div class="sh-file-info">
          <div class="sh-file-name">${et(f.name)}</div>
          <div class="sh-file-sz">${fmtSize(f.size)}</div>
        </div>
        <button class="sh-file-del" data-fid="${f.id}" aria-label="Remover">×</button>
      </div>`;
    });
    h+=`</div>`;
  } else {
    h+=`<div class="sh-files-empty">Nenhum arquivo ainda</div>`;
  }
  h+=`</div>`;
  el.innerHTML=h;

  // add button
  document.getElementById('shFilesAdd').addEventListener('click',function(e){
    e.stopPropagation();
    const inp=document.getElementById('fileInput');
    inp._sk=stopSk;
    inp.click();
  });

  // open file on row click
  el.querySelectorAll('.sh-file-row').forEach((row,i)=>{
    row.addEventListener('click',function(e){
      if(e.target.dataset.fid) return; // delete btn
      const f=files[i];
      if(!f) return;
      const blob=new Blob([f.data],{type:f.type||'application/octet-stream'});
      const url=URL.createObjectURL(blob);
      window.open(url,'_blank');
      setTimeout(()=>URL.revokeObjectURL(url),10000);
    });
  });

  // delete buttons
  el.querySelectorAll('.sh-file-del').forEach(btn=>{
    btn.addEventListener('click',async function(e){
      e.stopPropagation();
      await FILES.del(parseInt(this.dataset.fid));
      renderFilesSection(stopSk);
      // update card badge
      document.querySelectorAll('[data-sk="'+stopSk+'"]').forEach(async b=>{
        const h=await FILES.hasAny(stopSk);
        b.style.display=h?'inline-block':'none';
      });
    });
  });
}

// file input handler
document.getElementById('fileInput').addEventListener('change',async function(){
  const stopSk=this._sk;
  if(!stopSk||!this.files.length) return;
  for(const f of Array.from(this.files)){
    await FILES.save(stopSk,f);
  }
  this.value='';
  renderFilesSection(stopSk);
  // show badge on card
  document.querySelectorAll('[data-sk="'+stopSk+'"]').forEach(b=>{b.style.display='inline-block';});
});

</script>
